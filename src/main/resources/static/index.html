<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'rel='stylesheet'> 
    <link rel="stylesheet" href="styles.css">
    <title>Gerador de Permutas</title>
</head>
<body>

<main class="container">
    <form id="permutaForm">
        <h1> Permuta </h1>
        <div class="input-box">
                <input placeholder="Nome Substituto" type="text" id="nomeSubstituto">
        </div>

        <div class="input-box">
                <input placeholder="Nome Escalado" type="text" id="nomeEscalado">
        </div>

        <div class="input-box">
                <input placeholder="Seção Substituto" type="text" id="secaoSubstituto">
        </div>

        <div class="input-box">
                <input placeholder="Seção Escalado" type="text" id="secaoEscalado">
        </div>
        <div class="input-box">
                <input placeholder="Posto de Serviço" type="text" id="postoServico">
        </div>
        <div class="input-box">
                <input placeholder="Data do Serviço" type="text" id="dataServico">
        </div>

        <div class="buttoncss">
            <button type="submit">Gerar Permuta</button>
        </div>
        
    </form>

    <script src="javascript.js"></script>
    
    </main>

    
</body>
</html>
